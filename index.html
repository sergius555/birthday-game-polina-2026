<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Бортовой компьютер «Космический Единорог»</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Playfair+Display:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{--bg:#05060e;--tab:#0b1122;--tab2:#131b31;--muted:#8b95b3;--cyan:#5fd0e6;--accent:#e6b552;--rule:rgba(190,200,230,.22);--tabh:64px;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;width:100%;overflow:hidden;overscroll-behavior:none;background:#05060e}
  /* жёсткая блокировка прокрутки страницы на iOS (иначе под вкладками виден пустой низ) */
  body{position:fixed;inset:0;font-family:'Oswald',system-ui,sans-serif;-webkit-text-size-adjust:100%;touch-action:none;overscroll-behavior:none}
  /* space background in the side gutters */
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(1000px 800px at 80% -5%,rgba(60,90,180,.18),transparent 60%),
      radial-gradient(900px 700px at 10% 100%,rgba(120,70,160,.14),transparent 60%),#05060e}
  body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.7;
    background-image:radial-gradient(1.4px 1.4px at 30px 40px,#fff,transparent),
      radial-gradient(1.1px 1.1px at 130px 90px,#cdd8ff,transparent),
      radial-gradient(1.2px 1.2px at 210px 170px,#fff,transparent);
    background-repeat:repeat;background-size:230px 230px}

  .views{position:fixed;left:0;right:0;top:0;bottom:calc(var(--tabh) + env(safe-area-inset-bottom,0px));
    max-width:720px;margin:0 auto;z-index:1;transition:bottom .35s ease}
  .views iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;background:var(--bg)}
  .views iframe.active{display:block}
  /* incoming-call mode: iframe covers the whole screen (full darkening), tabs hidden */
  body.calling .views,body.gaming .views{bottom:0;max-width:none}
  body.calling .tabs,body.gaming .tabs{transform:translateY(140%);pointer-events:none}

  .tabs{position:fixed;left:0;right:0;bottom:0;max-width:720px;margin:0 auto;z-index:10;display:flex;transition:transform .35s ease;
    height:calc(var(--tabh) + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);
    background:linear-gradient(180deg,var(--tab2),var(--tab));border-top:2px solid var(--rule);box-shadow:0 -10px 30px rgba(0,0,0,.5)}
  .tabs button{flex:1;background:none;border:none;cursor:pointer;color:var(--muted);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    font-family:'Oswald';text-transform:uppercase;letter-spacing:.05em;font-size:9.5px;position:relative;transition:color .2s;padding:0 2px}
  .tabs button .i{font-size:20px;line-height:1;filter:grayscale(.4) opacity(.8)}
  .tabs button .badge{position:absolute;top:8px;right:calc(50% - 18px);width:8px;height:8px;border-radius:50%;background:#ff5468;box-shadow:0 0 7px #ff5468;display:none}
  .tabs button.notify .badge{display:block}
  .tabs button+button{border-left:1px solid rgba(190,200,230,.1)}
  .tabs button.active{color:var(--cyan)}
  .tabs button.active .i{filter:none}
  .tabs button.active::before{content:"";position:absolute;top:0;left:20%;right:20%;height:3px;background:var(--cyan);border-radius:0 0 3px 3px;box-shadow:0 0 10px var(--cyan)}
  .tabs button:active{transform:scale(.95)}

  /* ===== экран загрузки «бортового компьютера» ===== */
  #boot{position:fixed;inset:0;z-index:9999;background:radial-gradient(1200px 900px at 50% 42%,#0a1030,#05060e 70%);
    display:flex;align-items:center;justify-content:center;overflow:hidden;transition:opacity .6s ease;
    padding-top:env(safe-area-inset-top,0px)}
  #boot.hide{opacity:0;pointer-events:none}
  #bootstars{position:absolute;inset:0;z-index:0}
  .bootcore{position:relative;z-index:1;width:min(88vw,520px);text-align:center;padding:0 18px}
  .bootring{width:120px;height:120px;margin:0 auto 22px;border-radius:50%;position:relative;
    background:radial-gradient(circle at 42% 38%,#bfeaf6,#5fd0e6 46%,#2b6f86 72%,#123 100%);
    box-shadow:0 0 44px rgba(95,208,230,.6),inset -10px -8px 26px rgba(0,0,0,.5)}
  .bootring::before{content:"";position:absolute;inset:-16px;border-radius:50%;
    border:2px solid rgba(95,208,230,.35);border-top-color:#e6b552;border-right-color:#5fd0e6;
    animation:bootspin 3s linear infinite}
  .bootring::after{content:"🦄";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:52px;
    filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
  @keyframes bootspin{to{transform:rotate(360deg)}}
  .boottitle{font-family:'Playfair Display',serif;font-weight:900;color:#fbf9f1;line-height:1.05;
    font-size:clamp(24px,6.4vw,40px);text-shadow:0 0 26px rgba(95,208,230,.55);letter-spacing:.01em}
  .boottitle .sm{display:block;font-family:'Oswald';font-weight:600;text-transform:uppercase;letter-spacing:.34em;
    font-size:12px;color:var(--cyan);margin-bottom:10px;opacity:.9}
  .bootbar{height:5px;margin:20px auto 16px;border-radius:6px;background:rgba(95,208,230,.16);overflow:hidden;max-width:340px}
  .bootbar>i{display:block;height:100%;width:0;border-radius:6px;background:linear-gradient(90deg,#5fd0e6,#e6b552);
    box-shadow:0 0 12px rgba(95,208,230,.8);transition:width .25s ease}
  .bootlines{font-family:'Share Tech Mono',monospace;font-size:13.5px;color:#9fe6f2;text-align:left;
    max-width:340px;margin:0 auto;min-height:120px}
  .bootlines .bl{display:flex;align-items:center;gap:8px;opacity:0;transform:translateY(4px);
    transition:opacity .25s ease,transform .25s ease;margin:5px 0}
  .bootlines .bl.on{opacity:1;transform:none}
  .bootlines .dot{width:8px;height:8px;border-radius:50%;background:#3a4a5a;flex:0 0 auto;box-shadow:0 0 0 rgba(126,240,120,0)}
  .bootlines .bl.ok .dot{background:#7ef078;box-shadow:0 0 8px rgba(126,240,120,.9)}
  .bootlines .bl.ok .txt{color:#bfeecb}
  .bootlines .bl .txt{flex:1}
  .bootlines .bl .st{font-size:11px;letter-spacing:.14em;color:#7ef078;opacity:0;transition:opacity .2s}
  .bootlines .bl.ok .st{opacity:1}
  .bootskip{position:absolute;bottom:calc(20px + env(safe-area-inset-bottom,0px));left:0;right:0;text-align:center;
    font-family:'Oswald';text-transform:uppercase;letter-spacing:.2em;font-size:11px;color:var(--muted);z-index:1}
</style>
</head>
<body>
  <div id="boot">
    <canvas id="bootstars"></canvas>
    <div class="bootcore">
      <div class="bootring"></div>
      <div class="boottitle"><span class="sm">Бортовой компьютер</span>Система<br>Космического Единорога</div>
      <div class="bootbar"><i id="bootfill"></i></div>
      <div class="bootlines" id="bootlines"></div>
    </div>
    <div class="bootskip">коснитесь, чтобы пропустить</div>
  </div>

  <div class="views">
    <iframe id="f-hyper"  class="active" src="svyaz.html" title="Гиперсвязь"></iframe>
    <iframe id="f-gazeta"            src="vestnik.html"         title="Газета"></iframe>
    <iframe id="f-nav"               src="nav.html"       title="Навигация"></iframe>
    <iframe id="f-ship"              src="ship.html"         title="Корабль"></iframe>
  </div>

  <nav class="tabs">
    <button data-t="hyper"  class="active"><span class="i">📡</span>Гиперсвязь<span class="badge"></span></button>
    <button data-t="gazeta"><span class="i">📰</span>Газета<span class="badge"></span></button>
    <button data-t="nav"><span class="i">🧭</span>Навигация<span class="badge"></span></button>
    <button data-t="ship"><span class="i">🚀</span>Корабль<span class="badge"></span></button>
  </nav>

<script>
  // ===== экран загрузки «бортового компьютера» =====
  (function boot(){
    const el=document.getElementById('boot'); if(!el) return;
    // показываем экран загрузки только один раз (до сброса прогресса)
    try{ if(localStorage.getItem('edinorog_booted')){ el.remove(); return; } localStorage.setItem('edinorog_booted','1'); }catch(e){}
    // «прогрев» звёздной карты
    const cv=document.getElementById('bootstars'), ctx=cv.getContext('2d');
    let W=0,H=0,dpr=Math.min(2,window.devicePixelRatio||1), stars=[], t0=null, raf=null;
    function fit(){ W=cv.clientWidth;H=cv.clientHeight;cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
      stars=[]; for(let i=0;i<130;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()<.8?0.8:1.6,ph:Math.random()*6,born:Math.random()}); }
    fit();
    function draw(ts){ if(t0===null)t0=ts; const el=(ts-t0)/1000;
      ctx.clearRect(0,0,W,H);
      for(const s of stars){ const app=Math.min(1,Math.max(0,(el-s.born*1.6)/0.6)); if(app<=0)continue;
        const a=app*(0.35+Math.abs(Math.sin(ts/600+s.ph))*0.5); ctx.globalAlpha=a; ctx.fillStyle='#cfe6ff';
        ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,7);ctx.fill(); }
      ctx.globalAlpha=1; raf=requestAnimationFrame(draw); }
    raf=requestAnimationFrame(draw);
    // строки инициализации
    const LINES=['Питание · реактор','Гиперсвязь','Навигация','Звёздная карта','Единорог готов к полёту'];
    const box=document.getElementById('bootlines'), fill=document.getElementById('bootfill');
    LINES.forEach((tx,i)=>{ const d=document.createElement('div'); d.className='bl';
      d.innerHTML='<span class="dot"></span><span class="txt">'+tx+'…</span><span class="st">OK</span>'; box.appendChild(d); });
    const rows=[...box.children]; let done=false;
    rows.forEach((r,i)=>{ setTimeout(()=>r.classList.add('on'), 500+i*600);
      setTimeout(()=>{ r.classList.add('ok'); fill.style.width=Math.round((i+1)/rows.length*100)+'%'; }, 500+i*600+520); });
    function finish(){ if(done)return; done=true; el.classList.add('hide');
      setTimeout(()=>{ if(raf)cancelAnimationFrame(raf); el.remove(); }, 650); }
    const total=500+rows.length*600+520+900;
    const timer=setTimeout(finish,total);
    el.addEventListener('click',()=>{ clearTimeout(timer); finish(); });
    window.addEventListener('resize',fit);
  })();

  const frames={hyper:'f-hyper',gazeta:'f-gazeta',nav:'f-nav',ship:'f-ship'};
  const btns=[...document.querySelectorAll('.tabs button')];
  let current='hyper';

  // ---- global saved progress (localStorage lives in this TOP window — reliable on file://) ----
  const STORE='edinorog_state';
  const DEFAULT={level:1,callSeen:false,mailRead:[],mailLater:false,ship:'',scraps:'',decoded:'',access:'',nav:''};
  // read from localStorage (survives tab close) or window.name (survives reload even when file:// storage is blocked, e.g. Safari)
  function readRaw(){
    try{ const v=localStorage.getItem(STORE); if(v) return v; }catch(e){}
    try{ if((window.name||'').indexOf('EDST:')===0) return window.name.slice(5); }catch(e){}
    return null;
  }
  function loadState(){ try{return Object.assign({},DEFAULT,JSON.parse(readRaw()||'{}'));}catch(e){return Object.assign({},DEFAULT);} }
  function saveState(){ const j=JSON.stringify(gameState);
    try{ localStorage.setItem(STORE,j); }catch(e){}
    try{ window.name='EDST:'+j; }catch(e){}
  }
  // сброс прогресса: открыть index.html#reset (или ?reset)
  if(location.hash==='#reset' || location.search.indexOf('reset')>=0){
    try{localStorage.removeItem(STORE);}catch(e){}
    try{localStorage.removeItem('edinorog_booted');}catch(e){}   // при сбросе экран загрузки покажется снова
    try{window.name='';}catch(e){}
    try{location.replace(location.pathname);}catch(e){}
  }
  // отладка: #level=4 — прыжок на уровень (для повторного теста), напр. index.html#level=4
  var lvlM=(location.hash+location.search).match(/level=(\d+)/);
  if(lvlM){
    try{ var s=JSON.parse(localStorage.getItem(STORE)||'{}');
      s.level=parseInt(lvlM[1],10); s.callSeen=true; s.mailRead=['alisa']; s.ship='fixed'; s.access='ok'; s.nav=(s.level>=6?'fixed':s.level===5?'broken':'');
      localStorage.setItem(STORE,JSON.stringify(s)); }catch(e){}
    try{ location.replace(location.pathname); }catch(e){}
  }
  // отладка: #nodecode — сбросить только загадку-шифр (остаться на месте)
  if(location.hash==='#nodecode' || location.search.indexOf('nodecode')>=0){
    try{ var sd=JSON.parse(localStorage.getItem(STORE)||'{}'); sd.decoded=''; localStorage.setItem(STORE,JSON.stringify(sd)); window.name='EDST:'+JSON.stringify(sd); }catch(e){}
    try{ location.replace(location.pathname); }catch(e){}
  }
  let gameState=loadState();
  function applySet(key,val){
    if(key==='level') gameState.level=Math.max(gameState.level||1, parseInt(val,10)||1);
    else if(key==='callSeen') gameState.callSeen=true;
    else if(key==='mailLater') gameState.mailLater=true;
    else if(key==='mailRead'){ gameState.mailRead=gameState.mailRead||[]; if(!gameState.mailRead.includes(val)) gameState.mailRead.push(val); }
    else if(key==='ship') gameState.ship=val;
    else if(key==='scraps') gameState.scraps=val;
    else if(key==='decoded') gameState.decoded=val;
    else if(key==='access') gameState.access=val;
    else if(key==='nav') gameState.nav=val;
    else return;
    saveState();
  }
  function pushState(win){ try{ win.postMessage('state:'+JSON.stringify(gameState),'*'); }catch(e){} }

  function frameEl(name){return document.getElementById(frames[name]);}
  function activate(name){
    if(!frames[name]||name===current)return;
    if(current==='hyper'){ try{frameEl('hyper').contentWindow.postMessage('pause','*');}catch(e){} }
    Object.keys(frames).forEach(k=>frameEl(k).classList.toggle('active',k===name));
    btns.forEach(b=>{ b.classList.toggle('active',b.dataset.t===name); if(b.dataset.t===name) b.classList.remove('notify'); });
    current=name;
  }
  btns.forEach(b=>b.addEventListener('click',()=>{
    activate(b.dataset.t);
    // клик по «Гиперсвязь» всегда возвращает к списку писем (даже если открыто письмо/мини-игра письма)
    if(b.dataset.t==='hyper'){ try{frameEl('hyper').contentWindow.postMessage('gohome','*');}catch(e){} }
  }));
  // запрет прокрутки страницы-оболочки на iOS (тач внутри iframe сюда не долетает — игры/письма скроллятся сами)
  document.addEventListener('touchmove',e=>{ e.preventDefault(); },{passive:false});

  // push saved state to each page as it loads (covers the request/reply race)
  Object.keys(frames).forEach(k=>{ const f=frameEl(k); f.addEventListener('load',()=>pushState(f.contentWindow)); });

  // pages inside can: request/update saved state, switch tab, raise notifications
  window.addEventListener('message',(e)=>{
    if(typeof e.data!=='string')return;
    const d=e.data;
    if(d==='req:state'){ if(e.source) pushState(e.source); return; }
    if(d.indexOf('set:')===0){ const p=d.split(':'); applySet(p[1],p.slice(2).join(':'));
      Object.keys(frames).forEach(k=>pushState(frameEl(k).contentWindow)); return; }   // разослать обновлённое состояние всем вкладкам
    if(d.indexOf('tab:')===0) activate(d.slice(4));
    if(d==='call:on') document.body.classList.add('calling');
    if(d==='call:off') document.body.classList.remove('calling');
    if(d==='game:on'){ document.body.classList.add('gaming'); try{window.scrollTo(0,0);}catch(e){} }
    if(d==='game:off') document.body.classList.remove('gaming');
    if(d==='scroll0'){ try{ window.scrollTo(0,0); document.documentElement.scrollTop=0; if(document.body)document.body.scrollTop=0; }catch(e){} }
    if(d.indexOf('notify:')===0){ const n=d.slice(7); const b=btns.find(x=>x.dataset.t===n); if(b&&n!==current)b.classList.add('notify'); }
  });

  // initial broadcast in case an iframe finished loading before listeners were ready
  Object.keys(frames).forEach(k=>pushState(frameEl(k).contentWindow));

  // мягкий блип по нажатию вкладок/кнопок оболочки
  (function(){ let ac; document.addEventListener('click',e=>{ if(!e.target.closest('button'))return;
    try{ ac=ac||new (window.AudioContext||window.webkitAudioContext)(); if(ac.state==='suspended')ac.resume();
      const o=ac.createOscillator(),g=ac.createGain(); o.type='sine'; o.frequency.value=560;
      o.connect(g); g.connect(ac.destination); const t=ac.currentTime;
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.045,t+0.008); g.gain.exponentialRampToValueAtTime(0.0001,t+0.1);
      o.start(t); o.stop(t+0.11); }catch(_){}
  },true); })();
</script>
</body>
</html>
