<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Гиперсвязь — входящие</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,600&family=Oswald:wght@300;400;500;600;700&family=PT+Serif:ital,wght@0,400;0,700;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{--bg:#05060e;--panel1:#141b30;--panel2:#0e1425;--ink:#e7e3d5;--head:#fbf9f1;--muted:#9aa3bd;
    --rule:rgba(190,200,230,.28);--rule-soft:rgba(190,200,230,.16);--accent:#e6b552;--cyan:#5fd0e6;--red:#ff5468;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%}
  body{background:#05060e;font-family:'PT Serif',Georgia,serif;color:var(--ink);
    min-height:100vh;padding:14px 10px 22px;-webkit-text-size-adjust:100%;display:flex;justify-content:center}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(1000px 700px at 84% 4%,rgba(70,100,200,.2),transparent 62%),
      radial-gradient(1400px 1000px at 50% 40%,rgba(18,28,64,.5),transparent 72%),#05060e;}
  body::after{content:"";position:fixed;inset:0;z-index:0;opacity:.7;pointer-events:none;
    background-image:radial-gradient(1.3px 1.3px at 24px 32px,#fff,transparent),radial-gradient(1px 1px at 96px 70px,#dce8ff,transparent),radial-gradient(1px 1px at 150px 20px,#fff,transparent);
    background-repeat:repeat;background-size:200px 200px}
  audio{display:none}

  .mail{position:relative;z-index:1;width:100%;max-width:720px;
    background:linear-gradient(180deg,var(--panel1),var(--panel2));border:2px solid var(--accent);border-radius:12px;
    box-shadow:0 24px 70px rgba(0,0,0,.7);overflow:hidden;align-self:flex-start}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
    background:rgba(230,181,82,.1);border-bottom:1px solid var(--rule);padding:10px 16px;
    font-family:'Oswald';text-transform:uppercase;letter-spacing:.14em;font-size:11px;color:var(--accent)}
  .bar .r{display:inline-flex;align-items:center;gap:8px}
  .bar .r i{width:9px;height:9px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:bl 1.4s infinite}
  @keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
  .bar .id{font-family:'Share Tech Mono',monospace;color:var(--muted)}

  /* inbox list */
  .list{list-style:none}
  .item{display:flex;gap:12px;align-items:center;padding:13px 15px;border-bottom:1px solid var(--rule-soft);cursor:pointer;transition:background .15s}
  .item:active{background:rgba(95,208,230,.06)}
  .av{flex:0 0 auto;width:44px;height:44px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;
    font-size:22px;background:rgba(95,208,230,.1);border:1px solid var(--rule)}
  .av img{width:100%;height:100%;object-fit:cover;object-position:center top}
  .it{flex:1 1 auto;min-width:0}
  .it .top{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
  .it .from{font-family:'Oswald';font-weight:600;color:var(--head);font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .it .time{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);flex:0 0 auto}
  .it .subj{font-size:13.5px;color:var(--ink);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .it .snip{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item.unread .from{color:#fff}
  .item.unread .subj{font-weight:700;color:var(--head)}
  .dot{flex:0 0 auto;width:9px;height:9px;border-radius:50%;background:var(--cyan);box-shadow:0 0 7px var(--cyan);opacity:0}
  .item.unread .dot{opacity:1}
  .flag{display:inline-block;background:var(--red);color:#fff;font-family:'Oswald';font-weight:700;font-size:8.5px;
    letter-spacing:.12em;text-transform:uppercase;padding:1px 6px;border-radius:4px;margin-right:6px;vertical-align:middle}

  /* reader */
  #reader{position:fixed;inset:0;z-index:15;display:none;background:#070b18;overflow-y:auto;padding:0 0 30px}
  #reader.show{display:block}
  .rbar{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:10px;background:rgba(11,17,34,.96);
    border-bottom:1px solid var(--rule);padding:11px 14px;backdrop-filter:blur(4px)}
  .rbar button{font-family:'Oswald';text-transform:uppercase;letter-spacing:.1em;font-size:12px;color:var(--cyan);
    background:none;border:1px solid var(--rule);border-radius:20px;padding:7px 14px;cursor:pointer}
  .rbar button:active{transform:scale(.97)}
  .rwrap{max-width:620px;margin:0 auto;padding:16px}

  .rhead{display:flex;gap:14px;align-items:center;border-bottom:1px solid var(--rule);padding-bottom:14px;margin-bottom:14px}
  .rhead .av{width:60px;height:60px;font-size:28px}
  .rhead .from{font-family:'Playfair Display';font-weight:700;color:var(--head);font-size:22px}
  .rhead .role{font-family:'Oswald';text-transform:uppercase;letter-spacing:.12em;font-size:10.5px;color:var(--cyan);margin-top:4px}
  .rhead .subj{font-size:13px;color:var(--muted);margin-top:6px}
  .rbody p{font-size:15.5px;line-height:1.62;margin-bottom:12px}
  .rbody p.hi{font-family:'Playfair Display';font-style:italic;font-weight:600;font-size:18px;color:var(--head)}
  .rbody b{color:var(--head)} .rbody .warn{color:var(--accent);font-weight:700}
  .sign{margin-top:14px;text-align:right}
  .sign .s{font-family:'Playfair Display';font-style:italic;font-weight:700;font-size:24px;color:var(--head)}
  .portrait{float:right;width:132px;margin:0 0 10px 14px;border:2px solid var(--cyan);border-radius:8px;overflow:hidden;
    box-shadow:0 0 22px rgba(95,208,230,.3);position:relative}
  .portrait img{display:block;width:100%;height:auto}
  .portrait .ph{aspect-ratio:1/1.15;display:flex;align-items:center;justify-content:center;color:var(--cyan);background:linear-gradient(160deg,#0b1a3a,#0a1230)}
  .voicebtn{display:inline-flex;align-items:center;gap:8px;margin:2px 0 12px;font-family:'Oswald';text-transform:uppercase;
    letter-spacing:.1em;font-size:12px;color:#08131f;background:var(--cyan);border:none;border-radius:24px;padding:9px 18px;cursor:pointer}
  .go{display:inline-flex;align-items:center;gap:8px;margin-top:8px;font-family:'Oswald';font-weight:600;text-transform:uppercase;
    letter-spacing:.12em;font-size:12.5px;color:#1a1305;background:var(--accent);border-radius:28px;padding:10px 20px;text-decoration:none;cursor:pointer;border:none}
  .rbody .callout{display:flex;gap:10px;align-items:flex-start;margin:16px 0 4px;border:1px solid var(--accent);
    border-left:4px solid var(--accent);border-radius:6px;background:rgba(230,181,82,.10);padding:12px 15px;
    font-size:14.5px;line-height:1.5;color:#f4ecd6;box-shadow:0 0 20px rgba(230,181,82,.12)}
  .rbody .callout .ic{font-size:19px;line-height:1.1}
  .rbody .callout b{color:var(--accent)}

  /* incoming call */
  #call{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;
    background-color:#04050c;
    background-image:
      radial-gradient(circle at 50% 40%, rgba(30,46,92,.6), transparent 62%),
      radial-gradient(1.4px 1.4px at 30px 40px,#fff,transparent),
      radial-gradient(1.1px 1.1px at 130px 90px,#cdd8ff,transparent),
      radial-gradient(1.2px 1.2px at 210px 160px,#fff,transparent),
      radial-gradient(1px 1px at 90px 200px,#bcd,transparent);
    background-size:auto,240px 240px,240px 240px,240px 240px,240px 240px;
    background-repeat:no-repeat,repeat,repeat,repeat,repeat;
    transition:opacity .5s}
  #call.hide{opacity:0;pointer-events:none}
  .hail{display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;padding:24px}
  .hail .badge{font-family:'Share Tech Mono',monospace;letter-spacing:.14em;font-size:11px;color:var(--cyan);text-transform:uppercase}
  .awrap{position:relative;width:130px;height:130px;display:flex;align-items:center;justify-content:center;margin:8px 0}
  .awrap::before,.awrap::after{content:"";position:absolute;width:130px;height:130px;border-radius:50%;border:2px solid rgba(95,208,230,.55);animation:ping 2.2s ease-out infinite}
  .awrap::after{animation-delay:1.1s}
  @keyframes ping{0%{transform:scale(1);opacity:.7}100%{transform:scale(2.3);opacity:0}}
  .aimg{width:130px;height:130px;border-radius:50%;overflow:hidden;border:2px solid var(--cyan);box-shadow:0 0 34px rgba(95,208,230,.55);
    background:linear-gradient(160deg,#0b1a3a,#0a1230);position:relative;z-index:2}
  .aimg img{width:100%;height:100%;object-fit:cover;object-position:center top}
  .aimg .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--cyan);font-size:52px}
  .hail .title{font-family:'Oswald';text-transform:uppercase;letter-spacing:.2em;font-size:13px;color:var(--head);line-height:1.5;max-width:320px}
  .hail .name{font-family:'Playfair Display';font-weight:700;font-size:28px;color:var(--head)}
  .hail .sub{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted)}
  #accept{margin-top:12px;font-family:'Oswald';font-weight:600;text-transform:uppercase;letter-spacing:.18em;font-size:16px;
    color:#08131f;background:linear-gradient(180deg,#7ee1f2,#37b7d0);border:none;border-radius:44px;padding:15px 48px;cursor:pointer;
    box-shadow:0 0 24px rgba(95,208,230,.5);animation:btn 1.6s infinite;display:inline-flex;align-items:center;gap:10px}
  #accept .d{width:10px;height:10px;border-radius:50%;background:#0a5a2a;box-shadow:0 0 0 3px rgba(10,120,50,.35)}
  @keyframes btn{0%,100%{box-shadow:0 0 20px rgba(95,208,230,.4)}50%{box-shadow:0 0 36px rgba(95,208,230,.8)}}
  #accept:active{transform:scale(.97)}
</style>
</head>
<body>
<audio id="voice" preload="auto" src="audio.mp3"></audio>

<div class="mail">
  <div class="bar"><span class="r"><i></i>Гиперсвязь · входящие</span><span class="id" id="cnt"></span></div>
  <ul class="list" id="list"></ul>
</div>

<!-- reader -->
<div id="reader">
  <div class="rbar"><button id="back">← Входящие</button></div>
  <div class="rwrap" id="rcontent"></div>
</div>

<!-- incoming call -->
<div id="call">
  <div class="hail">
    <div class="badge">◉ Гиперсвязь · защищённый канал</div>
    <div class="awrap"><div class="aimg">
      <img src="alisa.jpg" alt="Алиса" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
      <div class="ph" style="display:none">👩‍🚀</div>
    </div></div>
    <div class="title">Вам входящее сообщение<br>по гиперсвязи</div>
    <div class="name">Алиса Селезнёва</div>
    <div class="sub" id="calling">борт «Пегас» · вызов…</div>
    <button id="accept"><span class="d"></span>Принять</button>
  </div>
</div>

<script>
  const voice=document.getElementById('voice');
  function stopVoice(){try{voice.pause();}catch(e){}}

  // avatar helper (photo for alisa, emoji otherwise)
  function avatarHTML(m,big){
    if(m.photo) return '<span class="av"><img src="alisa.jpg" alt="" onerror="this.parentNode.textContent=\'👩‍🚀\'"></span>';
    return '<span class="av">'+m.icon+'</span>';
  }

  // ---- messages ----
  const messages=[
    {id:'alisa',from:'Алиса Селезнёва',role:'Экипаж корабля «Пегас»',photo:true,urgent:true,unread:true,
     ts:4,time:'сейчас',subj:'СРОЧНО: помоги вернуть «галактий»!',
     snip:'Полина, случилась беда — без тебя не справиться…', special:'alisa'},
    {id:'parents',from:'Мама и Папа',icon:'💌',unread:true,ts:3,time:'утром',
     subj:'Наш космический герой ✨',
     snip:'Спасёшь галактику — не забудь вынести мусор!',
     body:`<p class="hi">Полиночка, наша звёздочка!</p>
       <p>Мы ужасно тобой гордимся: наша дочка спасает целую галактику! Только обещай нам две вещи.</p>
       <p>Первое: спасёшь мир — вынеси, пожалуйста, мусор 🚀. Второе: надень шапку, в космосе, говорят, сквозняки!</p>
       <p>Мы очень-очень тебя любим и ждём домой к ужину (даже если ты будешь на другом конце галактики).</p>
       <div class="sign"><div class="s">Мама и Папа</div></div>`},
    {id:'market',from:'Галакто-Маркет',icon:'🛍️',unread:false,ts:2,time:'вчера',
     subj:'Скидка 50% на корм для склиссов!',
     snip:'Только сегодня! Метеоритная пыль в подарок…',
     body:`<p><b>ГАЛАКТО-МАРКЕТ</b> — всё для юного космонавта!</p>
       <p>🪐 Корм для склиссов — минус 50%!<br>☄️ Метеоритная пыль — в подарок при заказе от 3 астероидов!<br>🧦 Носки с подогревом для полётов к Плутону.</p>
       <p style="color:var(--muted);font-style:italic">Это рекламное сообщение. Отписаться нельзя — мы же в космосе.</p>`},
    {id:'post',from:'Космопочта',icon:'✉️',unread:false,ts:1,time:'давно',
     subj:'Добро пожаловать в Гиперсвязь',
     snip:'Ваш почтовый ящик активирован.',
     body:`<p>Здравствуйте, капитан!</p>
       <p>Ваш ящик <b>Гиперсвязи</b> активирован. Сюда приходят сообщения со всей галактики: от друзей, экипажей кораблей и… иногда от совсем незнакомцев. Будьте внимательны.</p>
       <p>Хорошего полёта! 🌌</p>`}
  ];

  // messages that arrive later
  const laterMessages=[
    {id:'zeleny',from:'Механик Салатовый',icon:'🧑‍🔧',unread:true,ts:5,time:'только что',
     subj:'Держись, мы верим в тебя!',
     snip:'Крыс наследил на Венере — узнай, куда он рванул…',
     body:`<p>Полина, это Салатовый. Ранее известен как Зелёный. Твой папа сказал, что новое имя лучше, и я переименовался.</p>
       <p>Засекли твою посадку на Венеру — молодец! Но Крыс уже улетел, разминулись на пару часов.</p>
       <p>Зато он наследил. Заправщики видели его корабль: Крыс расспрашивал дорогу к самому большому космическому рынку галактики — туда, где торгуют редкими зверями со всех планет. Наверняка помчался туда сбыть краденое.</p>
       <p>Не помню, как называется этот рынок-планета, — узнай и проложи курс. Будь осторожна: Крыс хитёр.</p>
       <div class="sign"><div class="s">Механик Салатовый</div></div>`}
  ];

  const list=document.getElementById('list');
  function unreadCount(){return messages.filter(m=>m.unread).length;}
  function renderList(){
    list.innerHTML='';
    messages.slice().sort((a,b)=>(b.ts||0)-(a.ts||0)).forEach(m=>{
      const li=document.createElement('li');li.className='item'+(m.unread?' unread':'');
      li.innerHTML=avatarHTML(m)+
        '<div class="it"><div class="top"><span class="from">'+(m.urgent?'<span class="flag">Срочно</span>':'')+m.from+'</span><span class="time">'+m.time+'</span></div>'+
        '<div class="subj">'+m.subj+'</div><div class="snip">'+m.snip+'</div></div>'+
        '<span class="dot"></span>';
      li.addEventListener('click',()=>openMsg(m.id));
      list.appendChild(li);
    });
    document.getElementById('cnt').textContent='непрочитанных: '+unreadCount();
  }

  const reader=document.getElementById('reader'),rc=document.getElementById('rcontent');
  function openMsg(id){
    const m=messages.find(x=>x.id===id);if(!m)return;
    m.unread=false;
    persistSet('mailRead',m.id);
    if(m.special==='alisa') persistSet('callSeen','1');
    let html='<div class="rhead">'+avatarHTML(m,true).replace('class="av"','class="av"')+
      '<div><div class="from">'+m.from+'</div>'+(m.role?'<div class="role">'+m.role+'</div>':'')+
      '<div class="subj">'+m.subj+'</div></div></div><div class="rbody">';
    if(m.special==='alisa'){
      html+=`<button class="voicebtn" id="vb">▶ Прослушать сообщение</button>
        <p class="hi">Полина, привет! Это Алиса Селезнёва.</p>
        <p>Прости, что так неожиданно и по секретной гиперсвязи, но случилась беда — и без тебя нам не справиться.</p>
        <p>Космический пират <b>Крыс</b> сбежал. Он собрал целую команду и <span class="warn">напал на грузовой почтовый корабль</span>, забрав всё, что там было. А везли самое важное: абсолютное топливо <b>«галактий»</b> — учёные впервые в истории смогли создать его по секретной формуле. На таком топливе корабли долетят до самых дальних звёзд. Если «галактий» останется у Крыса, случится непоправимое.</p>
        <p>Мы с экипажем «Пегаса» сейчас страшно далеко — на другом конце галактики, и вернуться вовремя никак не успеваем. Капитаны тоже в дальней экспедиции, до них не докричаться.</p>
        <p>Я долго думала, кто способен всё исправить, — и поняла: <b>только ты</b>. Ты умная, смелая и никогда не сдаёшься. Пожалуйста, помоги нам вернуть топливо и останови Крыса. Я в тебя верю. Удачи, капитан Полина!</p>
        <div class="callout"><span class="ic">📡</span><div><b>С чего начать:</b> открой свежий выпуск «Космического Вестника» — там все подробности и первая зацепка.</div></div>
        <div class="sign"><div class="s">Алиса</div></div>`;
    } else { html+=m.body; }
    html+='</div>';
    rc.innerHTML=html;reader.classList.add('show');reader.scrollTop=0;

    if(m.special==='alisa'){
      try{voice.currentTime=0;voice.play().catch(()=>{});}catch(e){}
      const vb=document.getElementById('vb');
      if(vb)vb.addEventListener('click',()=>{ if(voice.paused){voice.play();vb.textContent='⏸ Пауза';} else {voice.pause();vb.textContent='▶ Прослушать сообщение';} });
      const tg=document.getElementById('toGazeta');
      if(tg)tg.addEventListener('click',()=>{ stopVoice(); if(window.parent!==window){try{window.parent.postMessage('tab:gazeta','*');}catch(_){}} });
    }
    renderList();
  }
  document.getElementById('back').addEventListener('click',()=>{stopVoice();reader.classList.remove('show');});

  // ---- persistence (state kept by the shell in localStorage — reliable on file://) ----
  const inShell = window.parent!==window;
  function localState(){
    try{ const v=localStorage.getItem('edinorog_state'); if(v) return JSON.parse(v)||{}; }catch(e){}
    try{ if((window.name||'').indexOf('EDST:')===0) return JSON.parse(window.name.slice(5))||{}; }catch(e){}
    return {};
  }
  function saveLocal(s){ const j=JSON.stringify(s);
    try{ localStorage.setItem('edinorog_state',j); }catch(e){}
    try{ window.name='EDST:'+j; }catch(e){}
  }
  function persistSet(key,val){
    try{ if(inShell) window.parent.postMessage('set:'+key+':'+val,'*'); }catch(e){}
    const s=localState();
    if(key==='mailRead'){ s.mailRead=s.mailRead||[]; if(!s.mailRead.includes(val)) s.mailRead.push(val); }
    else if(key==='mailLater') s.mailLater=true;
    else if(key==='callSeen') s.callSeen=true;
    saveLocal(s);
  }

  const call=document.getElementById('call');
  function shellMsg(m){ try{ if(window.parent!==window) window.parent.postMessage(m,'*'); }catch(e){} }
  let d=0;const cl=document.getElementById('calling');const base='борт «Пегас» · вызов';
  let di=null;
  function startCall(){ shellMsg('call:on'); di=setInterval(()=>{d=(d+1)%4;if(!call.classList.contains('hide'))cl.textContent=base+'.'.repeat(d);},400); }
  document.getElementById('accept').addEventListener('click',()=>{
    if(di)clearInterval(di);call.classList.add('hide');shellMsg('call:off');
    setTimeout(()=>{ openMsg('alisa'); }, 300);
  });

  let laterDone=false;
  function deliverLater(){ laterMessages.forEach(m=>{ if(!messages.find(x=>x.id===m.id)) messages.push(m); }); laterDone=true; }
  // письмо Салатового приходит, когда пройден раннер (level >= 3)
  function maybeDeliverLater(st){
    if(laterDone) return;
    if(st && (st.level>=3 || st.mailLater)){
      deliverLater(); renderList(); persistSet('mailLater','1');
      try{ if(inShell) window.parent.postMessage('notify:hyper','*'); }catch(e){}
    }
  }

  // shell messages: pause audio, or deliver the saved state
  window.addEventListener('message',(e)=>{
    if(typeof e.data!=='string')return;
    if(e.data==='pause'){ stopVoice(); return; }
    if(e.data.indexOf('state:')===0){ let st={}; try{st=JSON.parse(e.data.slice(6));}catch(_){}
      initWith(st); maybeDeliverLater(st); }
  });

  // ---- init / restore saved state ----
  let inited=false;
  function initWith(saved){
    if(inited)return; inited=true;
    saved=saved||{};
    const read=Array.isArray(saved.mailRead)?saved.mailRead:[];
    if(saved.mailLater || saved.level>=3) deliverLater();   // раннер уже пройден — письмо Салатового на месте
    messages.forEach(m=>{ if(read.includes(m.id)) m.unread=false; });
    renderList();
    const seen=saved.callSeen || read.includes('alisa');
    if(seen){
      call.classList.add('hide'); shellMsg('call:off');   // уже видели — без повторного звонка
    } else {
      startCall();
    }
  }
  // ask the shell for saved state; fall back to own storage if standalone / no reply
  if(inShell){ try{window.parent.postMessage('req:state','*');}catch(e){} setTimeout(()=>initWith(localState()),400); }
  else { initWith(localState()); }
</script>
</body>
</html>
